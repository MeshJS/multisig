version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      mesh-sdk:
        patterns:
          - "@meshsdk/*"
      next:
        patterns:
          - "next"
          - "next-*"
          - "@next/*"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      trpc:
        patterns:
          - "@trpc/*"
      types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
